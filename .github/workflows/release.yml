name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build project
      run: |
        cmake -H. -B_build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=_install -DCPACK_GENERATOR="TGZ"
        cmake --build _build
        cmake --build _build --target package

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: _build/*.tar.gz
        draft: false
        prerelease: false
        name: "Release ${{ github.ref_name }}"
        body: "Automated release for ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
