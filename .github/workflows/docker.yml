name: Docker Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Create LICENSE file if not exists
      run: |
        if [ ! -f LICENSE ]; then
          echo "MIT License" > LICENSE
          echo "Copyright (c) $(date +%Y)" >> LICENSE
        fi

    - name: Build Docker image
      run: docker build -t logger .

    - name: Run container
      run: |
        mkdir -p logs
        echo -e "test1\ntest2\ntest3" | docker run -i -v "$(pwd)/logs/:/home/logs/" logger || true

    - name: Check output
      run: |
        if [ -f logs/log.txt ]; then
          cat logs/log.txt
        else
          echo "Log file not found"
        fi
